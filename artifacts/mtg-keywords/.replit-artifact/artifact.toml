kind = "mobile"
previewPath = "/"
title = "MtG Schlüsselwörter"
version = "1.0.0"
id = "artifacts/mtg-keywords"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25770

[services.development]
run = "pnpm --filter @workspace/mtg-keywords run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mtg-keywords", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mtg-keywords", "run", "serve" ]

[services.env]
PORT = "25770"
BASE_PATH = "/"
