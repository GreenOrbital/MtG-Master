kind = "mobile"
previewPath = "/"
title = "MtG Master"
version = "1.0.0"
id = "artifacts/mtg-keywords"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 25770

[services.development]
run = "pnpm --filter @workspace/mtg-keywords run dev"

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/mtg-keywords run build:web && pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "25770"
NODE_ENV = "production"

[services.env]
PORT = "25770"
BASE_PATH = "/"
